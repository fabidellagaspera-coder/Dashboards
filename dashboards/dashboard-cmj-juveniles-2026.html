<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard CMJ Juveniles 2026 · GYE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#2b2b2b;color:#f0f0f0;min-height:100vh}

.header{background:linear-gradient(135deg,#1a1a1a 0%,#252525 60%,#1e1e1e 100%);border-bottom:1px solid #3a3a3a;padding:0 36px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffffff,#888,#ffffff)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
.header-left{display:flex;flex-direction:column;gap:6px}
.header-tag{font-size:9px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:3px}
.header-text h1{font-size:28px;font-weight:900;color:#ffffff;letter-spacing:-0.8px;line-height:1}
.header-text p{font-size:11px;color:#aaa;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.header-right{display:flex;align-items:center;gap:24px}
.header-badge{text-align:right}
.header-badge .badge-val{font-size:11px;font-weight:800;color:#ddd;letter-spacing:1px;text-transform:uppercase}
.header-badge .badge-lbl{font-size:9px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.header-divider-v{width:1px;height:36px;background:#3a3a3a}

.controls{padding:20px 36px 0;display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:10px}
.ctrl-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:1.2px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.ctrl-sep{width:1px;height:28px;background:#444}

.cat-btn{padding:6px 14px;border-radius:6px;border:1px solid #555;background:#383838;color:#ccc;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.cat-btn:hover{border-color:#888;color:#fff}
.cat-btn.active{background:#fff;border-color:#fff;color:#111}
.mes-btn{padding:5px 12px;border-radius:5px;border:1px solid #555;background:#383838;color:#ccc;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.mes-btn:hover{border-color:#888;color:#fff}
.mes-btn.active{background:#555;border-color:#888;color:#fff}

.stat-cards{display:flex;gap:16px;padding:24px 36px 0;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;background:#333;border:1px solid #484848;border-radius:10px;padding:18px 20px}
.stat-card .val{font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px}
.stat-card .lbl{font-size:10px;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

.tabs{display:flex;gap:0;padding:24px 36px 0;border-bottom:1px solid #444}
.tab{padding:10px 20px;font-size:12px;font-weight:700;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px}
.tab:hover{color:#ddd}
.tab.active{color:#fff;border-bottom-color:#fff}

.content{padding:28px 36px}
.metric-header{margin-bottom:20px}
.metric-header h2{font-size:18px;font-weight:800;color:#fff}
.metric-header h2 span{font-size:13px;font-weight:500;color:#aaa;margin-left:6px}
.metric-header p{font-size:12px;color:#bbb;margin-top:4px}
.metric-meta{display:flex;align-items:center;gap:16px;margin-top:8px;font-size:11px;color:#aaa;font-weight:600}
.meta-dot{width:6px;height:6px;border-radius:50%;background:#666;display:inline-block;margin-right:4px}

.avg-banner{display:inline-block;font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;float:right;text-align:right;line-height:1}
.avg-banner small{display:block;font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}

table{width:100%;border-collapse:collapse;margin-top:8px}
th{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;border-bottom:1px solid #484848}
td{padding:10px 12px;border-bottom:1px solid #383838;font-size:13px;vertical-align:middle}
tr:hover td{background:#303030}
.rank{color:#aaa;font-weight:700;font-size:11px;width:30px}
.jugador-name{font-weight:600;color:#e0e0e0}
.jugador-name.top{color:#fff}
.mes-badge{font-size:10px;color:#bbb;font-weight:600}
.metric-val{font-weight:700;color:#fff;font-size:14px}

.bar-wrap{width:120px;height:5px;background:#484848;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:8px}
.bar-up{height:5px;border-radius:3px;background:linear-gradient(90deg,#16a34a,#22c55e)}
.bar-dn{height:5px;border-radius:3px;background:linear-gradient(90deg,#991b1b,#ef4444)}

.b-up{background:#14532d;color:#4ade80;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block;min-width:52px;text-align:center}
.b-dn{background:#450a0a;color:#f87171;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block;min-width:52px;text-align:center}
.b-neu{background:#484848;color:#ccc;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block;min-width:52px;text-align:center}

/* Asymmetries */
.asym-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #3a3a3a}
.asym-label{font-size:12px;font-weight:600;color:#bbb;width:220px}
.asym-bar-wrap{flex:1;height:6px;background:#484848;border-radius:3px;margin:0 12px;position:relative}
.asym-fill{height:6px;border-radius:3px}
.a-low{background:linear-gradient(90deg,#166534,#22c55e)}
.a-mid{background:linear-gradient(90deg,#92400e,#f59e0b)}
.a-hi{background:linear-gradient(90deg,#991b1b,#ef4444)}
.asym-v{font-size:12px;font-weight:700;width:48px;text-align:right}
.av-low{color:#4ade80}
.av-mid{color:#fbbf24}
.av-hi{color:#f87171}
.asym-s{font-size:10px;font-weight:700;width:20px;text-align:center;padding:2px 4px;border-radius:3px;margin-left:6px}
.sL{background:#1e3a5f;color:#60a5fa}
.sR{background:#3b1f1f;color:#f87171}

.asym-player-row td{padding:8px 12px}
.asym-group-header{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;padding:14px 12px 6px;background:transparent}

.empty{text-align:center;color:#aaa;padding:60px;font-size:14px}
.clr{clear:both}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 700px) {
  .header{padding:0 16px}
  .header-top{flex-direction:column;align-items:flex-start;gap:12px;padding:16px 0}
  .header-tag{font-size:8px;letter-spacing:2px}
  .header-text h1{font-size:18px}
  .header-text p{font-size:9px;margin-top:4px}
  .header-right{display:flex;flex-wrap:wrap;gap:12px;width:100%;padding-bottom:12px}
  .header-badge .badge-val{font-size:10px}
  .header-divider-v{display:none}

  .controls{padding:14px 16px 0;gap:12px;flex-direction:column;align-items:flex-start}
  .ctrl-sep{display:none}
  .ctrl-label{font-size:9px}
  .cat-btn{padding:5px 10px;font-size:11px}
  .mes-btn{padding:4px 9px;font-size:10px}

  .stat-cards{padding:14px 16px 0;gap:10px}
  .stat-card{min-width:calc(50% - 5px);padding:12px 14px}
  .stat-card .val{font-size:22px}
  .stat-card .lbl{font-size:9px}

  .tabs{padding:16px 16px 0;overflow-x:auto;flex-wrap:nowrap}
  .tab{padding:8px 12px;font-size:11px;white-space:nowrap;flex-shrink:0}

  .content{padding:16px}
  .metric-header h2{font-size:15px}
  .avg-banner{font-size:24px;float:none;display:block;margin-bottom:8px}
  .clr{clear:none}

  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  th,td{padding:8px 8px;font-size:11px;white-space:nowrap}
  .bar-wrap{width:70px}
  .jugador-name{max-width:120px;overflow:hidden;text-overflow:ellipsis}

  .asym-bar-wrap{width:40px !important}
}

/* === COMPARATIVO === */
.comp-controls{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;align-items:flex-end}
.comp-ctrl{display:flex;flex-direction:column;gap:6px}
.comp-ctrl label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.08em}
.comp-ctrl select{background:#1e1e1e;color:#fff;border:1px solid #444;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;min-width:160px}
.comp-ctrl select:focus{outline:none;border-color:#4fc3f7}
.comp-mes1-lbl{color:#4fc3f7;font-weight:700}
.comp-mes2-lbl{color:#81c784;font-weight:700}
.comp-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:20px;font-weight:700;padding:14px 18px;background:#1a1a1a;border-radius:10px;border-left:4px solid #4fc3f7}
.comp-table{width:100%;border-collapse:collapse}
.comp-table th{background:#1a1a1a;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:10px 14px;text-align:left;border-bottom:1px solid #333}
.comp-table td{padding:10px 14px;border-bottom:1px solid #2a2a2a;vertical-align:middle}
.comp-table tr:hover td{background:rgba(255,255,255,.03)}
.comp-metric-name{font-size:13px;font-weight:600;color:#e0e0e0}
.comp-metric-name small{font-size:10px;color:#888;font-weight:400;margin-left:4px}
.comp-v1{font-size:15px;color:#4fc3f7;font-weight:700}
.comp-v2{font-size:15px;color:#81c784;font-weight:700}
.comp-arrow-cell{font-size:18px;text-align:center}
.tab.comp-tab{border:1px solid #4fc3f7}
.tab.comp-tab.active{background:linear-gradient(135deg,#0288d1,#4fc3f7);color:#fff}
@media(max-width:700px){.comp-controls{flex-direction:column}.comp-ctrl select{min-width:100%}}
</style>
</head>

  ).join('');

  // Mes buttons
  const rows = DATA.filter(d => d.categoria === selCat);
  const mesesDisp = MESES.filter(m => m==='Todos' || rows.some(d=>d.mes===m));
  document.getElementById('mesBtns').innerHTML = mesesDisp.map(m =>
    '<button class="mes-btn' + (m===selMes?' active':'') + '" data-mes="' + m + '">' + m + '</button>'
  ).join('');

  const f = filtered();

  // Update header badges
  document.getElementById('hdr-jugadores').textContent = new Set(f.map(d=>d.jugador)).size;
  document.getElementById('hdr-mes').textContent = selMes;

  // Stat cards
  const cards = [
    {label:'JUGADORES', val: new Set(f.map(d=>d.jugador)).size, unit:''},
    {label:'JUMP HEIGHT (CM)', val: avg(f,'jump_height'), unit:''},
    {label:'RSI (M/S)', val: avg(f,'rsi'), unit:''},
    {label:'CPF / BM (N/KG)', val: avg(f,'cpf_bm'), unit:''},
    {label:'PEAK POWER (W/KG)', val: avg(f,'pp_bm'), unit:''},
  ];
  document.getElementById('statCards').innerHTML = cards.map(c =>
    '<div class="stat-card"><div class="val">' + (c.val!=null?parseFloat(c.val.toFixed(1)):'-') + '</div><div class="lbl">' + c.label + '</div></div>'
  ).join('');

  // Tabs
  document.getElementById('tabs').innerHTML = METRICS.map((m,i) =>
    '<div class="tab' + (i===activeTab?' active':'') + '" onclick="activeTab=' + i + ';render()">' + m.label + '</div>'
  ).join('') + '<div class="tab comp-tab' + (activeTab===-1?' active':'') + '" onclick="activeTab=-1;render()">⚡ Comparativo</div>';

  renderContent(f);
}

function renderContent(f) {
  const el = document.getElementById('content');
  if (activeTab === -1) { renderComparativo(el); return; }
  const m = METRICS[activeTab];
  if (m.key === 'asym') { renderAsym(f, el); return; }
  renderMetric(f, m, el);
}

function renderMetric(f, m, el) {
  const players = {};
  f.forEach(d => {
    if (d[m.key] == null) return;
    const key = d.jugador;
    if (!players[key] || d[m.key] > players[key].val)
      players[key] = {name: d.jugador, val: d[m.key], mes: d.mes};
  });
  const list = Object.values(players).sort((a,b) => b.val - a.val);
  const mean = list.length ? list.reduce((s,p)=>s+p.val,0)/list.length : null;

  if (!list.length) { el.innerHTML='<div class="empty">Sin datos para esta selección</div>'; return; }

  let html = '<div class="metric-header">';
  html += '<div class="clr">';
  if (mean!=null) html += '<div class="avg-banner">' + mean.toFixed(1) + '<small>PROMEDIO ' + m.unit.toUpperCase() + '</small></div>';
  html += '<h2>' + m.label + ' <span>' + m.unit + '</span></h2>';
  html += '<p>' + m.desc + '</p>';
  html += '<div class="metric-meta"><span><span class="meta-dot"></span>' + (selMes==='Todos'?'Todos los meses':selMes) + '</span><span>' + list.length + ' jugadores</span></div>';
  html += '</div></div>';

  html += '<table><thead><tr><th>#</th><th>Jugador</th><th>Mes</th><th>' + m.label + '</th><th>VS Promedio</th><th>Diferencia</th></tr></thead><tbody>';
  list.forEach((p,i) => {
    const pct = mean ? ((p.val - mean)/mean*100) : 0;
    const up = pct >= 1, dn = pct <= -1;
    const barW = Math.min(Math.abs(pct)/30*100, 100);
    const badge = up ? '<span class="b-up">+'+pct.toFixed(1)+'%</span>' : dn ? '<span class="b-dn">'+pct.toFixed(1)+'%</span>' : '<span class="b-neu">~0%</span>';
    const bar = up ? '<div class="bar-wrap"><div class="bar-up" style="width:'+barW+'%"></div></div>' : dn ? '<div class="bar-wrap"><div class="bar-dn" style="width:'+barW+'%"></div></div>' : '<div class="bar-wrap"></div>';
    html += '<tr><td class="rank">'+(i+1)+'</td><td class="jugador-name'+(i<3?' top':'')+'">'+p.name+'</td><td class="mes-badge">'+p.mes+'</td><td class="metric-val">'+p.val.toFixed(1)+'</td><td>'+bar+'</td><td>'+badge+'</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderAsym(f, el) {
  let html = '<div class="metric-header"><h2>Asimetrías</h2><p>Semáforo: verde &lt;10% · amarillo 10-15% · rojo &gt;15%</p></div>';

  const players = [...new Set(f.map(d=>d.jugador))].sort();
  if (!players.length) { el.innerHTML='<div class="empty">Sin datos</div>'; return; }

  html += '<table><thead><tr><th>Jugador</th>';
  ASYMS.forEach(a => html += '<th>'+a.label+'</th>');
  html += '</tr></thead><tbody>';

  players.forEach(name => {
    const rows = f.filter(d=>d.jugador===name);
    const best = {};
    ASYMS.forEach(a => {
      const vals = rows.map(d=>d[a.key]).filter(v=>v!=null);
      if (vals.length) best[a.key] = vals.reduce((b,v)=>v.value<b.value?v:b);
    });
    html += '<tr><td class="jugador-name" style="font-size:12px">'+name+'</td>';
    ASYMS.forEach(a => {
      const v = best[a.key];
      if (!v) { html += '<td class="mes-badge">-</td>'; return; }
      const p = v.value;
      const fc = p < 10 ? 'a-low' : p <= 15 ? 'a-mid' : 'a-hi';
      const vc = p < 10 ? 'av-low' : p <= 15 ? 'av-mid' : 'av-hi';
      html += '<td><div style="display:flex;align-items:center;gap:4px">';
      html += '<div class="asym-bar-wrap" style="width:60px"><div class="asym-fill '+fc+'" style="width:'+Math.min(p/30*100,100)+'%"></div></div>';
      html += '<span class="asym-v '+vc+'">'+p.toFixed(1)+'%</span>';
      html += '<span class="asym-s s'+v.side+'">'+v.side+'</span>';
      html += '</div></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}


// ============================================================
// COMPARATIVO
// ============================================================
var compJugador = null, compMes1 = null, compMes2 = null;

function renderComparativo(el) {
  var mesOrder = ['Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var catData = DATA.filter(function(d){ return d.categoria === selCat; });
  var players = Array.from(new Set(catData.map(function(d){ return d.jugador; }))).sort();
  var meses = Array.from(new Set(catData.map(function(d){ return d.mes; }))).sort(function(a,b){ return mesOrder.indexOf(a)-mesOrder.indexOf(b); });

  // Default selections
  if (!compJugador || players.indexOf(compJugador)<0) compJugador = players[0]||null;
  if (!compMes1 || meses.indexOf(compMes1)<0) compMes1 = meses[0]||null;
  if (!compMes2 || meses.indexOf(compMes2)<0) compMes2 = meses.length>1 ? meses[meses.length-1] : (meses[0]||null);

  // Build selectors
  var html = '<div class="comp-controls">';
  html += '<div class="comp-ctrl"><label>Jugador</label><select id="comp-jug">';
  players.forEach(function(p){ html += '<option value="'+p+'"'+(p===compJugador?' selected':'')+'>'+p+'</option>'; });
  html += '</select></div>';
  html += '<div class="comp-ctrl"><label>Evaluación 1</label><select id="comp-mes1">';
  meses.forEach(function(m){ html += '<option value="'+m+'"'+(m===compMes1?' selected':'')+'>'+m+'</option>'; });
  html += '</select></div>';
  html += '<div class="comp-ctrl"><label>Evaluación 2</label><select id="comp-mes2">';
  meses.forEach(function(m){ html += '<option value="'+m+'"'+(m===compMes2?' selected':'')+'>'+m+'</option>'; });
  html += '</select></div>';
  html += '</div>';

  if (!compJugador || !compMes1 || !compMes2) {
    el.innerHTML = html + '<div class="empty">Sin datos disponibles</div>';
    attachCompEvents(); return;
  }

  var d1 = catData.find(function(d){ return d.jugador===compJugador && d.mes===compMes1; });
  var d2 = catData.find(function(d){ return d.jugador===compJugador && d.mes===compMes2; });

  // Header
  html += '<div class="comp-header">';
  html += '<span class="comp-mes1-lbl">'+compMes1+'</span>';
  html += '<span style="color:#aaa">→</span>';
  html += '<span class="comp-mes2-lbl">'+compMes2+'</span>';
  html += '<span style="color:#aaa;font-size:14px;margin-left:auto;font-weight:400">'+compJugador+'</span>';
  html += '</div>';

  if (!d1 && !d2) {
    el.innerHTML = html + '<div class="empty">No hay datos para '+compJugador+' en ninguna de las fechas seleccionadas</div>';
    attachCompEvents(); return;
  }

  var COMP_METRICS = [
    {key:'jump_height',  label:'Jump Height',       unit:'cm',   higherBetter:true},
    {key:'rsi',          label:'RSI',               unit:'m/s',  higherBetter:true},
    {key:'cpf_bm',       label:'CPF / BM',          unit:'N/kg', higherBetter:true},
    {key:'epp_bm',       label:'EPP / BM',          unit:'W/kg', higherBetter:true},
    {key:'pp_bm',        label:'Peak Power / BM',   unit:'W/kg', higherBetter:true},
    {key:'stiff_asym',   label:'Asim. Stiffness',   unit:'%',    higherBetter:false},
    {key:'cpf_asym',     label:'Asim. CPF',         unit:'%',    higherBetter:false},
    {key:'epf_asym',     label:'Asim. EPF',         unit:'%',    higherBetter:false},
    {key:'landrfd_asym', label:'Asim. Landing RFD', unit:'%',    higherBetter:false},
    {key:'eccdec_asym',  label:'Asim. Ecc Dec RFD', unit:'%',    higherBetter:false},
    {key:'peakland_asym',label:'Asim. Peak Landing', unit:'%',   higherBetter:false},
  ];

  html += '<table class="comp-table"><thead><tr>';
  html += '<th>Métrica</th>';
  html += '<th style="color:#4fc3f7">'+compMes1+'</th>';
  html += '<th style="color:#81c784">'+compMes2+'</th>';
  html += '<th style="text-align:center"></th>';
  html += '<th>Cambio</th>';
  html += '</tr></thead><tbody>';

  COMP_METRICS.forEach(function(m) {
    var v1 = d1 ? d1[m.key] : null;
    var v2 = d2 ? d2[m.key] : null;
    if (v1 == null && v2 == null) return;
    var hasChange = v1 != null && v2 != null;
    var pct = hasChange ? ((v2 - v1) / Math.abs(v1) * 100) : null;
    var neutral = hasChange && Math.abs(pct) < 1;
    var improved = hasChange && !neutral && (m.higherBetter ? pct > 0 : pct < 0);
    var worsened = hasChange && !neutral && !improved;
    var pctClass = neutral ? 'b-neu' : improved ? 'b-up' : 'b-dn';
    var arrow = neutral ? '→' : improved ? '↑' : '↓';
    var arrowColor = neutral ? '#aaa' : improved ? '#66bb6a' : '#ef5350';
    html += '<tr>';
    html += '<td class="comp-metric-name">'+m.label+' <small>'+m.unit+'</small></td>';
    html += '<td class="comp-v1">'+(v1!=null?v1.toFixed(2):'—')+'</td>';
    html += '<td class="comp-v2">'+(v2!=null?v2.toFixed(2):'—')+'</td>';
    html += '<td class="comp-arrow-cell" style="color:'+arrowColor+'">'+( hasChange ? arrow : '' )+'</td>';
    if (hasChange) {
      html += '<td><span class="'+pctClass+'">'+(pct>0?'+':'')+pct.toFixed(1)+'%</span></td>';
    } else {
      html += '<td style="color:#aaa;font-size:12px">sin dato</td>';
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  el.innerHTML = html;
  attachCompEvents();
}

function attachCompEvents() {
  var jug = document.getElementById('comp-jug');
  var m1  = document.getElementById('comp-mes1');
  var m2  = document.getElementById('comp-mes2');
  if (jug) jug.addEventListener('change', function(){ compJugador=this.value; renderComparativo(document.getElementById('content')); });
  if (m1)  m1.addEventListener('change',  function(){ compMes1=this.value;    renderComparativo(document.getElementById('content')); });
  if (m2)  m2.addEventListener('change',  function(){ compMes2=this.value;    renderComparativo(document.getElementById('content')); });
}

render();

// Event delegation - avoids quote issues in onclick attributes
document.getElementById('catBtns').addEventListener('click', function(e) {
  var t = e.target.closest('button');
  if (t && t.dataset.cat) { selCat = t.dataset.cat; selMes = 'Todos'; activeTab = 0; render(); }
});
document.getElementById('mesBtns').addEventListener('click', function(e) {
  var t = e.target.closest('button');
  if (t && t.dataset.mes) { selMes = t.dataset.mes; render(); }
});
</script>
