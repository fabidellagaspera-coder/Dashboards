<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Dashboards</title>
<style>
  :root{
    --bg:#0f1720; --card:#182231; --text:#eef2f6; --muted:#9aa7b8;
    --accent:#4fd1a5; --wa:#25D366;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding:24px 16px 60px;
  }
  h1{font-size:22px; margin:0 0 4px;}
  p.sub{color:var(--muted); margin:0 0 24px; font-size:14px;}
  .list{max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:12px;}
  .card{
    background:var(--card); border-radius:12px; padding:16px 18px;
    display:flex; flex-direction:column; gap:10px;
  }
  .card .title{font-weight:600; font-size:16px;}
  .card .date{color:var(--muted); font-size:13px;}
  .actions{display:flex; gap:10px; flex-wrap:wrap;}
  a.btn{
    text-decoration:none; padding:8px 14px; border-radius:8px; font-size:14px;
    font-weight:600; display:inline-flex; align-items:center; gap:6px;
  }
  .btn.open{background:var(--accent); color:#0f1720;}
  .btn.wa{background:var(--wa); color:#fff;}
  .empty{color:var(--muted); text-align:center; margin-top:40px; font-size:14px;}
</style>
</head>
<body>
  <h1>Mis Dashboards</h1>
  <p class="sub">Todos los reportes, con link permanente para compartir.</p>
  <div class="list" id="list"></div>
  <div class="empty" id="empty" style="display:none;">Todavía no hay dashboards cargados.</div>

<script>
fetch('dashboards.json?_=' + Date.now())
  .then(r => r.json())
  .then(items => {
    items.sort((a,b) => new Date(b.date) - new Date(a.date));
    const list = document.getElementById('list');
    if (!items.length) {
      document.getElementById('empty').style.display = 'block';
      return;
    }
    const base = window.location.href.replace(/index\.html?$/, '');
    items.forEach(item => {
      const url = base + item.file;
      const waText = encodeURIComponent(item.title + '\n' + url);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="title">${item.title}</div>
        <div class="date">${item.date}</div>
        <div class="actions">
          <a class="btn open" href="${item.file}" target="_blank">Abrir dashboard</a>
          <a class="btn wa" href="https://wa.me/?text=${waText}" target="_blank">Compartir por WhatsApp</a>
        </div>
      `;
      list.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('empty').style.display = 'block';
  });
</script>
</body>
</html>
